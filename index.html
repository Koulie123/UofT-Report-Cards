<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junior Blues Aquatics – Swim Progress Cards</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #dde8f0;
    min-height: 100vh;
  }

  /* ─── Upload Screen ─── */
  #upload-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .upload-logo {
    font-size: 1.8rem;
    font-weight: 900;
    color: #1a3a5c;
    margin-bottom: 4px;
    text-align: center;
  }

  .upload-sub {
    font-size: 0.85rem;
    color: #4a6a8a;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
    text-align: center;
  }

  .drop-zone {
    width: 460px;
    max-width: 100%;
    border: 3px dashed #7aaac8;
    border-radius: 10px;
    background: white;
    padding: 52px 36px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
  }

  .drop-zone.dragover,
  .drop-zone:hover {
    border-color: #1a3a5c;
    background: #f0f7ff;
    box-shadow: 0 6px 20px rgba(26,58,92,0.12);
    transform: translateY(-2px);
  }

  .drop-icon { font-size: 2.8rem; margin-bottom: 14px; }

  .drop-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a3a5c;
    margin-bottom: 6px;
  }

  .drop-hint {
    font-size: 0.82rem;
    color: #7a9ab8;
    margin-bottom: 22px;
  }

  .btn-browse {
    background: #1a3a5c;
    color: white;
    border: none;
    padding: 11px 28px;
    border-radius: 5px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s;
  }
  .btn-browse:hover { background: #2a5a8c; }

  #file-input { display: none; }

  .col-hint {
    margin-top: 24px;
    background: #f0f7ff;
    border: 1px solid #c0d8ee;
    border-radius: 8px;
    padding: 14px 22px;
    width: 460px;
    max-width: 100%;
  }

  .col-hint h4 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #4a6a8a;
    margin-bottom: 8px;
  }

  .col-hint-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px 12px;
  }

  .col-hint-grid span { font-size: 0.8rem; color: #1a3a5c; }
  .col-hint-grid span::before { content: "• "; color: #6fa3c8; }

  .error-box {
    display: none;
    margin-top: 14px;
    background: #fff0f0;
    border: 1px solid #e08080;
    color: #8a2020;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 0.82rem;
    width: 460px;
    max-width: 100%;
  }

  /* ─── Cards Screen ─── */
  #cards-screen { display: none; }

  .top-bar {
    background: #1a3a5c;
    color: white;
    padding: 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .top-bar-title {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .top-bar-right { display: flex; gap: 10px; align-items: center; }
  .card-count { font-size: 0.78rem; opacity: 0.65; }

  .btn-new {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.45);
    color: white;
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-new:hover { border-color: white; background: rgba(255,255,255,0.1); }

  .btn-print {
    background: #5a9abf;
    border: none;
    color: white;
    padding: 7px 18px;
    border-radius: 4px;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-print:hover { background: #4a8aaf; }

  /* ─── Cards Grid (screen) ─── */
  #cards-container {
    padding: 28px 32px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ─── Single Card ─── */
  .swim-card {
    background: white;
    border: 2px solid #8ab0cc;
    display: flex;
    flex-direction: column;
  }

  .card-header {
    background: #a8c8e0;
    border-bottom: 2px solid #7aaac8;
    padding: 12px 16px;
    text-align: center;
  }
  .card-header .org        { font-size: 1.15rem; font-weight: 900; color: #0d2a44; }
  .card-header .card-title { font-size: 1.05rem; font-weight: 900; color: #0d2a44; text-transform: uppercase; }

  .card-body { padding: 10px 13px 8px; flex: 1; display: flex; flex-direction: column; }

  .card-field { margin-bottom: 7px; }

  /* Inline field */
  .card-field.inline {
    display: flex;
    align-items: stretch;
    border: 1px solid #8ab0cc;
  }
  .card-field.inline .f-label {
    background: #bedaee;
    border-right: 1px solid #8ab0cc;
    padding: 6px 11px;
    font-size: 0.92rem;
    font-weight: 700;
    color: #0d2a44;
    white-space: nowrap;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }
  .card-field.inline .f-value {
    padding: 6px 11px;
    font-size: 0.94rem;
    color: #0d2a44;
    background: white;
    flex: 1;
    display: flex;
    align-items: center;
  }

  /* Comments field — grows to fill remaining space */
  .field-comments {
    display: flex;
    flex-direction: column;
    flex: 1;
    margin-bottom: 7px;
  }
  .field-comments .f-label {
    background: #bedaee;
    border: 1px solid #8ab0cc;
    padding: 6px 11px;
    font-size: 0.92rem;
    font-weight: 700;
    color: #0d2a44;
  }
  .field-comments .f-value {
    border: 1px solid #8ab0cc;
    border-top: none;
    padding: 8px 11px;
    font-size: 0.94rem;
    color: #0d2a44;
    flex: 1;
    min-height: 180px;
    white-space: pre-wrap;
    line-height: 1.6;
    background: white;
  }

  .card-footer {
    border-top: 1px solid #8ab0cc;
    padding: 8px 13px;
    font-size: 0.82rem;
    color: #222;
    line-height: 1.55;
    background: #f5f5f5;
  }
  .card-footer a { color: #1a5aaa; }

  /* ══════════════════════════════════════
     PRINT — landscape, full-page, 2-up
     Usable area on landscape letter with 12mm margins:
       width  ≈ 257mm  (11in − 2×12mm)
       height ≈ 192mm  (8.5in − 2×12mm)
     Each card: ~124mm wide, 192mm tall
  ══════════════════════════════════════ */
  @page {
    size: letter landscape;
    margin: 12mm;
  }

  @media print {
    html, body {
      width: 100%;
      height: 100%;
      background: white;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    #upload-screen { display: none !important; }
    #cards-screen  { display: block !important; width: 100%; height: 100%; }
    .top-bar       { display: none !important; }

    /* Each "page group" is a row of 2 cards that fills the printable area */
    #cards-container {
      padding: 0;
      margin: 0;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6mm;
      /* No height set here — let page-group divs control it */
    }

    /* Wrap pairs in a page-filling div via JS at print time */
    .print-page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6mm;
      width: 100%;
      height: 192mm;   /* full usable height with 12mm margins */
      page-break-after: always;
      break-after: page;
    }
    .print-page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    .swim-card {
      page-break-inside: avoid;
      break-inside: avoid;
      height: 100%;
      border: 2px solid #8ab0cc !important;
    }

    .card-header  { background: #a8c8e0 !important; }
    .card-field.inline .f-label { background: #bedaee !important; }
    .field-comments .f-label    { background: #bedaee !important; }
    .card-footer  { background: #f5f5f5 !important; }

    /* Slightly larger text for print */
    .card-header .org        { font-size: 1.25rem; }
    .card-header .card-title { font-size: 1.1rem;  }
    .card-field.inline .f-label,
    .field-comments .f-label { font-size: 1rem; }
    .card-field.inline .f-value,
    .field-comments .f-value { font-size: 1rem; }
    .card-footer             { font-size: 0.88rem; }
  }

  @media (max-width: 680px) {
    #cards-container { grid-template-columns: 1fr; padding: 16px; }
  }
</style>
</head>
<body>

<!-- ═══════ UPLOAD SCREEN ═══════ -->
<div id="upload-screen">
  <div class="upload-logo">Junior Blues Aquatics</div>
  <div class="upload-sub">Swim Progress Comment Cards</div>

  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">📋</div>
    <div class="drop-title">Drop your Excel file here</div>
    <div class="drop-hint">.xlsx or .xls files accepted</div>
    <button class="btn-browse" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Browse File</button>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>

  <div class="col-hint">
    <h4>Expected Column Headers in your Excel file</h4>
    <div class="col-hint-grid">
      <span>Name:</span>
      <span>Swim Level:</span>
      <span>Instructor Comments:</span>
      <span>Next Time Register In:</span>
      <span>Instructor Name:</span>
      <span>Date:</span>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>
</div>

<!-- ═══════ CARDS SCREEN ═══════ -->
<div id="cards-screen">
  <div class="top-bar">
    <div class="top-bar-title">Junior Blues Aquatics – Swim Progress Cards</div>
    <div class="top-bar-right">
      <span class="card-count" id="card-count"></span>
      <button class="btn-new" onclick="resetToUpload()">↩ New File</button>
      <button class="btn-print" onclick="doPrint()">🖨 Print Cards</button>
    </div>
  </div>
  <div id="cards-container"></div>
</div>

<script>
  const FIELDS = [
    { key: 'Name:',                  label: 'Name:',                  comments: false },
    { key: 'Swim Level:',            label: 'Swim Level:',            comments: false },
    { key: 'Instructor Comments:',   label: 'Instructor Comments:',   comments: true  },
    { key: 'Next Time Register In:', label: 'Next Time Register In:', comments: false },
    { key: 'Instructor Name:',       label: 'Instructor Name:',       comments: false },
    { key: 'Date:',                  label: 'Date:',                  comments: false },
  ];

  const FOOTER_URL = 'recreation.utoronto.ca';

  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
  });

  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) processFile(e.target.files[0]);
  });

  function processFile(file) {
    document.getElementById('error-box').style.display = 'none';
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

        if (!rows.length) { showError('The spreadsheet appears to be empty.'); return; }

        const missing = FIELDS.map(f => f.key).filter(k => !(k in rows[0]));
        if (missing.length) {
          showError('Missing columns: ' + missing.join(', ') + '. Please check headers match exactly (including colons).');
          return;
        }
        renderCards(rows);
      } catch(err) {
        showError('Could not read the file. Please make sure it is a valid .xlsx or .xls file.');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function formatDate(val) {
    if (!val) return '';
    if (val instanceof Date) {
      const y = val.getFullYear();
      const m = String(val.getMonth()+1).padStart(2,'0');
      const d = String(val.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }
    return String(val);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function makeCard(row) {
    const card = document.createElement('div');
    card.className = 'swim-card';

    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = '<div class="org">Junior Blues Aquatics</div><div class="card-title">Swim Progress Comment Card</div>';
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'card-body';

    FIELDS.forEach(f => {
      const field = document.createElement('div');
      let value = row[f.key];
      if (f.key === 'Date:') value = formatDate(value);
      else value = (value === null || value === undefined) ? '' : String(value);

      if (f.comments) {
        field.className = 'card-field field-comments';
        field.innerHTML = `<div class="f-label">${f.label}</div><div class="f-value">${escapeHtml(value)}</div>`;
      } else {
        field.className = 'card-field inline';
        field.innerHTML = `<div class="f-label">${f.label}</div><div class="f-value">${escapeHtml(value)}</div>`;
      }
      body.appendChild(field);
    });

    card.appendChild(body);

    const footer = document.createElement('div');
    footer.className = 'card-footer';
    footer.innerHTML = `Registration for Spring/Summer 2026 Junior Blues programs will be April 1<sup>st</sup> at 7am.<br>Please use our online registration service at: <a href="https://${FOOTER_URL}">${FOOTER_URL}</a>`;
    card.appendChild(footer);

    return card;
  }

  function renderCards(rows) {
    const container = document.getElementById('cards-container');
    container.innerHTML = '';

    // Build flat list of cards — print layout handled in doPrint()
    rows.forEach(row => container.appendChild(makeCard(row)));

    document.getElementById('card-count').textContent = rows.length + ' card' + (rows.length !== 1 ? 's' : '');
    document.getElementById('upload-screen').style.display = 'none';
    document.getElementById('cards-screen').style.display = 'block';
  }

  // Before printing: restructure DOM into .print-page wrappers (2 cards each),
  // then restore afterwards so the screen view is unchanged.
  function doPrint() {
    const container = document.getElementById('cards-container');
    const cards = Array.from(container.children);

    // Build print-page groups
    const pages = [];
    for (let i = 0; i < cards.length; i += 2) {
      const page = document.createElement('div');
      page.className = 'print-page';
      page.appendChild(cards[i].cloneNode(true));
      if (cards[i + 1]) page.appendChild(cards[i + 1].cloneNode(true));
      pages.push(page);
    }

    // Swap container contents
    container.innerHTML = '';
    pages.forEach(p => container.appendChild(p));

    window.print();

    // Restore flat card list
    container.innerHTML = '';
    cards.forEach(c => container.appendChild(c));
  }

  function showError(msg) {
    const b = document.getElementById('error-box');
    b.textContent = '⚠ ' + msg;
    b.style.display = 'block';
  }

  function resetToUpload() {
    document.getElementById('cards-screen').style.display = 'none';
    document.getElementById('upload-screen').style.display = 'flex';
    document.getElementById('file-input').value = '';
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('cards-container').innerHTML = '';
  }
</script>
</body>
</html>
